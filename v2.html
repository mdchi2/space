<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>Space Invaders - Milei Edition</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
background: #000;
font-family: 'Courier New', monospace;
color: #0f0;
touch-action: none;
overflow: hidden;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}
#gameContainer {
position: relative;
width: 100%;
max-width: 800px;
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}
h1 {
margin: 5px 0;
text-shadow: 0 0 10px #0f0;
font-size: 1.3rem;
text-align: center;
}
#info {
font-size: 18px;
margin: 5px 0 8px;
white-space: nowrap;
}
canvas {
border: 4px solid #0f0;
image-rendering: pixelated;
max-width: 100%;
max-height: calc(100vh - 120px); /* espacio para título e info */
touch-action: none;
box-shadow: 0 0 20px #0f0;
}
#instructions {
font-size: 0.85rem;
margin-top: 8px;
opacity: 0.75;
text-align: center;
}
.kuka, .gato {
position: absolute;
font-weight: bold;
pointer-events: none;
z-index: 100;
}
.kuka {
font-size: 80px;
color: #ff0;
text-shadow: 0 0 20px #f00;
animation: kukaAnim 1.2s forwards;
}
.gato {
font-size: 32px;
color: #0ff;
text-shadow: 0 0 12px #0ff;
animation: gatoAnim 0.9s forwards;
}
@keyframes kukaAnim {
0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
100% { opacity: 0; transform: translate(-50%, -80%) scale(1.4); }
}
@keyframes gatoAnim {
0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
100% { opacity: 0; transform: translate(-50%, -130%) scale(1.4); }
}
/* En móviles ocultamos instrucciones de teclado y reducimos márgenes */
@media (max-width: 820px) {
h1 { font-size: 1.1rem; margin: 8px 0 4px; }
#info { font-size: 16px; }
canvas { max-height: calc(100vh - 100px); }
#instructions { font-size: 0.8rem; }
}
</style>
</head>
<body>
<div id="gameContainer">
<h1>SPACE INVADERS - MILEI vs AXEL</h1>
<div id="info">
Nivel: <span id="level">1</span> | Puntos: <span id="points">0000</span> | Vidas: <span id="lives">10</span>
</div>
<canvas id="game" width="800" height="600"></canvas>
<p id="instructions">Toca y arrastra para mover • Toca para disparar</p>
<p style="opacity: 0.6; margin-top: 4px;">by Mariano Damian ver 2.0</p>
</div>
<script>
// === Código JavaScript (igual que antes pero con resize) ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('points');
const levelEl = document.getElementById('level');
const livesEl = document.getElementById('lives');
let score = 0, level = 1, lives = 10;
let gameOver = false, paused = false;
const player = { x: 375, y: 520, width: 60, height: 50, speed: 8 };
let bullets = [], enemyBullets = [], enemies = [];
const enemyRows = 5, enemyCols = 9;
let keys = {};
let enemyMoveTimer = 0, enemyMoveInterval = 25;
let isTouching = false;
// Imágenes
const mileiImg = new Image(); mileiImg.src = "milei.jpg";
const axelImg = new Image(); axelImg.src = "axel.jpg";
// Función para ajustar el tamaño del canvas manteniendo proporción
function resizeCanvas() {
const container = document.getElementById('gameContainer');
const maxWidth = Math.min(800, window.innerWidth - 20);
const maxHeight = window.innerHeight - 140; // espacio para título, info e instrucciones
const ratio = 800 / 600;
let newWidth = maxWidth;
let newHeight = newWidth / ratio;
if (newHeight > maxHeight) {
newHeight = maxHeight;
newWidth = newHeight * ratio;
}
canvas.style.width = newWidth + 'px';
canvas.style.height = newHeight + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
// Eventos táctiles (mismos que antes)
canvas.addEventListener('touchstart', e => {
e.preventDefault();
if (gameOver || paused) return;
isTouching = true;
const touch = e.touches[0];
const rect = canvas.getBoundingClientRect();
const touchX = (touch.clientX - rect.left) * (800 / rect.width); // coordenadas internas
player.x = touchX - player.width / 2;
shoot();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
e.preventDefault();
if (!isTouching || gameOver || paused) return;
const touch = e.touches[0];
const rect = canvas.getBoundingClientRect();
const touchX = (touch.clientX - rect.left) * (800 / rect.width);
player.x = touchX - player.width / 2;
player.x = Math.max(0, Math.min(800 - player.width, player.x));
}, { passive: false });
canvas.addEventListener('touchend', () => isTouching = false);
// Teclado (desktop)
window.addEventListener('keydown', e => {
keys[e.key] = true;
if (e.key === ' ' && !gameOver && !paused) shoot();
if (e.key.toLowerCase() === 'p') togglePause();
});
window.addEventListener('keyup', e => keys[e.key] = false);
function togglePause() { if (!gameOver) paused = !paused; }
function shoot() {
if (gameOver || paused) return;
bullets.push({ x: player.x + player.width/2 - 3, y: player.y - 5, width: 6, height: 20, speed: 15 });
}
// El resto del código (initLevel, enemyShoot, update, draw, etc.) se mantiene igual que en la versión anterior
// ... (pega aquí todo el código del juego desde "function initLevel()" hasta el final de la versión anterior)
function initLevel() { /* mismo código */ }
function enemyShoot() { /* mismo */ }
function showKuka() { /* mismo */ }
function showGato(x, y) { /* mismo */ }
function drawPlayer() { /* mismo */ }
function drawBullets() { /* mismo */ }
function drawEnemies() { /* mismo */ }
function update() {
if (gameOver || paused) return;
// teclado
if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
player.x = Math.max(0, Math.min(800 - player.width, player.x));
// resto del update igual...
// (balas, enemigos, colisiones, etc.)
// ... (mantén todo el update anterior)
}
function draw() {
ctx.fillStyle = '#000011';
ctx.fillRect(0, 0, 800, 600);
ctx.fillStyle = '#fff';
for (let i = 0; i < 60; i++) {
ctx.fillRect((i*23)%800, (i*37)%700, 1.5, 1.5);
}
drawPlayer();
drawBullets();
drawEnemies();
}
function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}
function resetGame() { /* mismo código */ }
// Disparos enemigos
setInterval(() => { if (!gameOver && !paused) enemyShoot(); }, 520);
resetGame();
resizeCanvas(); // ← importante: ajustar al cargar
gameLoop();
</script>
</body></html>
