<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Space Invaders - Milei Edition</title>

<style>
body {
margin: 0;
background: #000;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
font-family: 'Courier New', monospace;
color: #0f0;
touch-action: none;
overflow: hidden;
}
#gameContainer {
text-align: center;
position: relative;
width: 100%;
max-width: 800px;
}
h1 {
margin: 8px 0 5px;
text-shadow: 0 0 10px #0f0;
font-size: 1.4rem;
}
#info {
font-size: 20px;
margin: 8px 0;
}
canvas {
border: 4px solid #0f0;
image-rendering: pixelated;
width: 100%;
height: auto;
max-width: 800px;
touch-action: none;
}
.controls {
display: none;
margin-top: 12px;
padding: 0 15px;
}
#instructions {
font-size: 0.9rem;
margin-top: 8px;
opacity: 0.8;
}
.kuka, .gato {
position: absolute;
font-weight: bold;
pointer-events: none;
z-index: 100;
}
.kuka {
font-size: 80px;
color: #ff0;
text-shadow: 0 0 20px #f00;
animation: kukaAnim 1.2s forwards;
}
.gato {
font-size: 32px;
color: #0ff;
text-shadow: 0 0 12px #0ff;
animation: gatoAnim 0.9s forwards;
}
@keyframes kukaAnim {
0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
100% { opacity: 0; transform: translate(-50%, -80%) scale(1.4); }
}
@keyframes gatoAnim {
0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
100% { opacity: 0; transform: translate(-50%, -130%) scale(1.4); }
}
@media (max-width: 820px) {
h1 { font-size: 1.2rem; }
#info { font-size: 18px; }
#instructions {
display: none; /* Ocultamos instrucciones de teclado en móvil */
}
}
</style>
</head>
<body>
<div id="gameContainer">
<h1>SPACE INVADERS - MILEI vs AXEL</h1>
<div id="info">
Nivel: <span id="level">1</span> | Puntos: <span id="points">0000</span> | Vidas: <span id="lives">10</span>
</div>
<canvas id="game" width="800" height="600"></canvas>
<p id="instructions">En móvil: Toca y arrastra para mover • Toca para disparar</p>
<p style="opacity: 0.7;">by Mariano Damian</p>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('points');
const levelEl = document.getElementById('level');
const livesEl = document.getElementById('lives');
let score = 0;
let level = 1;
let lives = 10;
let gameOver = false;
let paused = false;
const player = { x: 375, y: 520, width: 60, height: 50, speed: 8 };
let bullets = [];
let enemyBullets = [];
let enemies = [];
const enemyRows = 5;
const enemyCols = 9;
let keys = {};
let enemyMoveTimer = 0;
let enemyMoveInterval = 25;
// Variables para control táctil
let isTouching = false;
let lastTouchX = 0;
// Imágenes
const mileiImg = new Image();
mileiImg.src = "milei.jpg";
const axelImg = new Image();
axelImg.src = "axel.jpg";
// ==================== EVENTOS TÁCTILES ====================
canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd);
function handleTouchStart(e) {
e.preventDefault();
if (gameOver || paused) return;
isTouching = true;
const touch = e.touches[0];
const rect = canvas.getBoundingClientRect();
lastTouchX = touch.clientX - rect.left;
// Disparar al tocar
shoot();
}
function handleTouchMove(e) {
e.preventDefault();
if (!isTouching || gameOver || paused) return;
const touch = e.touches[0];
const rect = canvas.getBoundingClientRect();
const currentX = touch.clientX - rect.left;
// Mover jugador hacia donde está el dedo
player.x = currentX - player.width / 2;
// Limitar dentro de la pantalla
player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
lastTouchX = currentX;
}
function handleTouchEnd() {
isTouching = false;
}
// Mantener compatibilidad con teclado (desktop)
window.addEventListener('keydown', e => {
keys[e.key] = true;
if (e.key === ' ' && !gameOver && !paused) shoot();
if (e.key.toLowerCase() === 'p') togglePause();
});
window.addEventListener('keyup', e => keys[e.key] = false);
function togglePause() {
if (!gameOver) paused = !paused;
}
function shoot() {
if (gameOver || paused) return;
bullets.push({
x: player.x + player.width/2 - 3,
y: player.y - 5,
width: 6,
height: 20,
speed: 15
});
}
// ==================== RESTO DEL JUEGO (sin cambios mayores) ====================
function initLevel() {
enemies = [];
const baseSpeed = 1.1 + level * 0.5;
for (let r = 0; r < enemyRows; r++) {
for (let c = 0; c < enemyCols; c++) {
enemies.push({
x: 75 + c * 55,
y: 40 + r * 45,
width: 42,
height: 42,
alive: true,
type: r,
speed: baseSpeed
});
}
}
enemyMoveInterval = Math.max(8, 35 - level * 4);
}
function enemyShoot() {
const alive = enemies.filter(e => e.alive);
if (alive.length === 0) return;
const shooter = alive[Math.floor(Math.random() * alive.length)];
enemyBullets.push({
x: shooter.x + 17,
y: shooter.y + 30,
width: 6,
height: 18,
speed: 7 + level * 1.2
});
}
function showKuka() {
const msg = document.createElement('div');
msg.textContent = "KUKA";
msg.className = "kuka";
msg.style.left = "50%";
msg.style.top = "45%";
document.getElementById('gameContainer').appendChild(msg);
setTimeout(() => msg.remove(), 1500);
}
function showGato(x, y) {
const msg = document.createElement('div');
msg.textContent = "GATO";
msg.className = "gato";
msg.style.left = (x + 15) + "px";
msg.style.top = (y + 10) + "px";
document.getElementById('gameContainer').appendChild(msg);
setTimeout(() => msg.remove(), 900);
}
function drawPlayer() {
ctx.drawImage(axelImg, player.x, player.y, player.width, player.height);
}
function drawBullets() {
ctx.fillStyle = '#ff0';
bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
ctx.fillStyle = '#f66';
enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
}
function drawEnemies() {
enemies.forEach(e => {
if (e.alive) {
ctx.drawImage(mileiImg, e.x, e.y, e.width, e.height);
}
});
}
function update() {
if (gameOver || paused) return;
// Controles de teclado (para desktop)
if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
// Balas jugador
for (let i = bullets.length - 1; i >= 0; i--) {
bullets[i].y -= bullets[i].speed;
if (bullets[i].y < 0) bullets.splice(i, 1);
}
// Balas enemigas
for (let i = enemyBullets.length - 1; i >= 0; i--) {
enemyBullets[i].y += enemyBullets[i].speed;
if (enemyBullets[i].y > canvas.height) enemyBullets.splice(i, 1);
}
// Movimiento enemigos
enemyMoveTimer++;
if (enemyMoveTimer > enemyMoveInterval) {
enemyMoveTimer = 0;
let edge = false;
enemies.forEach(e => {
if (!e.alive) return;
e.x += e.speed * (level % 2 === 0 ? -1 : 1);
if (e.x <= 10 || e.x + e.width >= canvas.width - 10) edge = true;
});
if (edge) {
enemies.forEach(e => { if (e.alive) e.y += 42; });
}
}
// Colisiones balas → enemigos
for (let i = bullets.length - 1; i >= 0; i--) {
const b = bullets[i];
for (let j = enemies.length - 1; j >= 0; j--) {
const e = enemies[j];
if (!e.alive) continue;
if (b.x < e.x + e.width && b.x + b.width > e.x &&
b.y < e.y + e.height && b.y + b.height > e.y) {
showGato(e.x, e.y);
e.alive = false;
bullets.splice(i, 1);
score += (5 - e.type) * 25;
break;
}
}
}
// Colisiones balas enemigas → jugador
for (let i = enemyBullets.length - 1; i >= 0; i--) {
const b = enemyBullets[i];
if (b.x < player.x + player.width && b.x + b.width > player.x &&
b.y < player.y + player.height && b.y + b.height > player.y) {
enemyBullets.splice(i, 1);
lives--;
livesEl.textContent = lives;
showKuka();
if (lives <= 0) gameOver = true;
break;
}
}
// Enemigos llegan al jugador
if (enemies.some(e => e.alive && e.y + e.height > player.y - 20)) {
gameOver = true;
}
// Siguiente nivel
if (enemies.every(e => !e.alive)) {
level++;
levelEl.textContent = level;
lives = 10;
livesEl.textContent = '10';
initLevel();
}
scoreEl.textContent = String(score).padStart(4, '0');
if (gameOver) {
alert("GAME OVER\nPuntos: " + score + "\nNivel alcanzado: " + level);
resetGame();
}
}
function draw() {
ctx.fillStyle = '#000011';
ctx.fillRect(0, 0, canvas.width, canvas.height);
// Estrellas de fondo
ctx.fillStyle = '#fff';
for (let i = 0; i < 60; i++) {
ctx.fillRect((i*23)%canvas.width, (i*37)%(canvas.height+100), 1.5, 1.5);
}
drawPlayer();
drawBullets();
drawEnemies();
}
function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}
function resetGame() {
score = 0;
level = 1;
lives = 10;
player.x = 375;
bullets = [];
enemyBullets = [];
scoreEl.textContent = '0000';
levelEl.textContent = '1';
livesEl.textContent = '10';
initLevel();
gameOver = false;
paused = false;
}
// Disparos enemigos automáticos
setInterval(() => {
if (!gameOver && !paused) enemyShoot();
}, 520);
resetGame();
gameLoop();
</script>
</body></html>
