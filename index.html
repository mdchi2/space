<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>Space Invaders - Milei Edition</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000;
color: #0f0;
font-family: 'Courier New', monospace;
touch-action: none;
overflow: hidden;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}
#gameContainer {
position: relative;
width: 100%;
height: 100vh;
max-width: 600px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}
h1 {
font-size: 1.25rem;
margin: 8px 0 6px;
text-shadow: 0 0 10px #0f0;
text-align: center;
}
#info {
font-size: 17px;
margin-bottom: 8px;
white-space: nowrap;
}
canvas {
border: 5px solid #0f0;
image-rendering: pixelated;
width: 100%;
max-width: 600px;
height: auto;
max-height: calc(100vh - 130px);
box-shadow: 0 0 25px #0f0;
touch-action: none;
}
#instructions {
font-size: 0.85rem;
margin-top: 10px;
opacity: 0.8;
text-align: center;
padding: 0 15px;
}
.kuka, .gato {
position: absolute;
font-weight: bold;
pointer-events: none;
z-index: 200;
}
.kuka { font-size: 70px; color: #ff0; text-shadow: 0 0 20px #f00; animation: kukaAnim 1.2s forwards; }
.gato { font-size: 28px; color: #0ff; text-shadow: 0 0 12px #0ff; animation: gatoAnim 0.9s forwards; }
@keyframes kukaAnim { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(1.4); } }
@keyframes gatoAnim { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); } 100% { opacity: 0; transform: translate(-50%, -130%) scale(1.4); } }
</style></head>
<body>
<div id="gameContainer">
<h1>SPACE INVADERS<br>MILEI vs AXEL</h1>
<div id="info">
Nivel: <span id="level">1</span> | Puntos: <span id="points">0000</span> | Vidas: <span id="lives">∞</span>
</div>
<canvas id="game" width="600" height="800"></canvas>
<p id="instructions">Celu: Toca y arrastra para mover • Toca para disparar<br>
Compu: ← → Mover | ESPACIO = Disparar | P = Pausa</p>
<p style="opacity: 0.6;">by Mariano Damian ver 2.05</p>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('points');
const levelEl = document.getElementById('level');
const livesEl = document.getElementById('lives');
let score = 0, level = 1;
let gameOver = false, paused = false;
const player = { x: 270, y: 720, width: 60, height: 50, speed: 9 };
let bullets = [], enemyBullets = [], enemies = [];
const enemyRows = 5;
const enemyCols = 8;
let keys = {};
let enemyMoveTimer = 0;
let enemyMoveInterval = 30;
let isTouching = false;
// Imágenes
const mileiImg = new Image(); mileiImg.src = "milei.jpg";
const axelImg = new Image(); axelImg.src = "axel.jpg";
// Resize canvas
function resizeCanvas() {
const maxW = Math.min(600, window.innerWidth * 0.95);
const maxH = window.innerHeight - 160;
const ratio = 600 / 800;
let w = maxW;
let h = w / ratio;
if (h > maxH) {
h = maxH;
w = h * ratio;
}
canvas.style.width = w + 'px';
canvas.style.height = h + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));
// Controles táctiles
canvas.addEventListener('touchstart', e => {
e.preventDefault();
if (gameOver || paused) return;
isTouching = true;
const touch = e.touches[0];
const rect = canvas.getBoundingClientRect();
const touchX = (touch.clientX - rect.left) * (600 / rect.width);
player.x = touchX - player.width / 2;
shoot();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
e.preventDefault();
if (!isTouching || gameOver || paused) return;
const touch = e.touches[0];
const rect = canvas.getBoundingClientRect();
const touchX = (touch.clientX - rect.left) * (600 / rect.width);
player.x = touchX - player.width / 2;
player.x = Math.max(0, Math.min(600 - player.width, player.x));
}, { passive: false });
canvas.addEventListener('touchend', () => { isTouching = false; });
// Teclado
window.addEventListener('keydown', e => {
keys[e.key] = true;
if (e.key === ' ' && !gameOver && !paused) shoot();
if (e.key.toLowerCase() === 'p') togglePause();
});
window.addEventListener('keyup', e => keys[e.key] = false);
function togglePause() { if (!gameOver) paused = !paused; }
function shoot() {
if (gameOver || paused) return;
bullets.push({
x: player.x + player.width/2 - 3,
y: player.y - 8,
width: 6,
height: 22,
speed: 16
});
}
// ==================== JUEGO ====================
function initLevel() {
enemies = [];
const baseSpeed = 0.9 + level * 0.4;
for (let r = 0; r < enemyRows; r++) {
for (let c = 0; c < enemyCols; c++) {
enemies.push({
x: 50 + c * 60,
y: 60 + r * 48,
width: 45,
height: 45,
alive: true,
type: r,
speed: baseSpeed
});
}
}
enemyMoveInterval = Math.max(12, 40 - level * 4);
}
function enemyShoot() {
const alive = enemies.filter(e => e.alive);
if (alive.length === 0) return;
const shooter = alive[Math.floor(Math.random() * alive.length)];
enemyBullets.push({
x: shooter.x + 19,
y: shooter.y + 35,
width: 7,
height: 18,
speed: 6.5 + level * 1.1
});
}
function showKuka() {
const msg = document.createElement('div');
msg.textContent = "KUKA";
msg.className = "kuka";
msg.style.left = "50%";
msg.style.top = "45%";
document.getElementById('gameContainer').appendChild(msg);
setTimeout(() => msg.remove(), 1400);
}
function showGato(x, y) {
const msg = document.createElement('div');
msg.textContent = "GATO";
msg.className = "gato";
msg.style.left = (x + 10) + "px";
msg.style.top = (y + 15) + "px";
document.getElementById('gameContainer').appendChild(msg);
setTimeout(() => msg.remove(), 900);
}
function drawPlayer() {
ctx.drawImage(axelImg, player.x, player.y, player.width, player.height);
}
function drawBullets() {
ctx.fillStyle = '#ff0';
bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
ctx.fillStyle = '#f66';
enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
}
function drawEnemies() {
enemies.forEach(e => {
if (e.alive) ctx.drawImage(mileiImg, e.x, e.y, e.width, e.height);
});
}
function update() {
if (gameOver || paused) return;
// Teclado
if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
player.x = Math.max(0, Math.min(600 - player.width, player.x));
// Balas jugador
for (let i = bullets.length - 1; i >= 0; i--) {
bullets[i].y -= bullets[i].speed;
if (bullets[i].y < -20) bullets.splice(i, 1);
}
// Balas enemigas
for (let i = enemyBullets.length - 1; i >= 0; i--) {
enemyBullets[i].y += enemyBullets[i].speed;
if (enemyBullets[i].y > 820) enemyBullets.splice(i, 1);
}
// Movimiento enemigos
enemyMoveTimer++;
if (enemyMoveTimer > enemyMoveInterval) {
enemyMoveTimer = 0;
let edge = false;
enemies.forEach(e => {
if (!e.alive) return;
e.x += e.speed * (level % 2 === 0 ? -1 : 1);
if (e.x <= 15 || e.x + e.width >= 585) edge = true;
});
if (edge) {
enemies.forEach(e => { if (e.alive) e.y += 45; });
}
}
// Colisiones balas → enemigos
for (let i = bullets.length - 1; i >= 0; i--) {
const b = bullets[i];
for (let j = enemies.length - 1; j >= 0; j--) {
const e = enemies[j];
if (!e.alive) continue;
if (b.x < e.x + e.width && b.x + b.width > e.x &&
b.y < e.y + e.height && b.y + b.height > e.y) {
showGato(e.x, e.y);
e.alive = false;
bullets.splice(i, 1);
score += (5 - e.type) * 30;
break;
}
}
}
// Colisiones balas enemigas → jugador (solo efecto visual)
for (let i = enemyBullets.length - 1; i >= 0; i--) {
const b = enemyBullets[i];
if (b.x < player.x + player.width && b.x + b.width > player.x &&
b.y < player.y + player.height && b.y + b.height > player.y) {
enemyBullets.splice(i, 1);
showKuka(); // Solo muestra "KUKA", no resta vidas
break;
}
}
// Game Over solo si los enemigos llegan abajo
if (enemies.some(e => e.alive && e.y + e.height > player.y - 30)) {
gameOver = true;
}
// Siguiente nivel
if (enemies.every(e => !e.alive)) {
level++;
levelEl.textContent = level;
livesEl.textContent = '∞'; // Mantiene infinito
initLevel();
}
scoreEl.textContent = String(score).padStart(4, '0');
if (gameOver) {
alert("GAME OVER\n\nPuntos: " + score + "\nNivel alcanzado: " + level + "\n\n¡Modo Vidas Infinitas!");
resetGame();
}
}
function draw() {
ctx.fillStyle = '#000011';
ctx.fillRect(0, 0, 600, 800);
ctx.fillStyle = '#fff';
for (let i = 0; i < 80; i++) {
ctx.fillRect((i*19)%600, (i*31)%800, 1.8, 1.8);
}
drawPlayer();
drawBullets();
drawEnemies();
}
function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}
function resetGame() {
score = 0; level = 1; player.x = 270;
bullets = []; enemyBullets = [];
scoreEl.textContent = '0000';
levelEl.textContent = '1';
livesEl.textContent = '∞';
initLevel();
gameOver = false;
paused = false;
}
setInterval(() => {
if (!gameOver && !paused) enemyShoot();
}, 480);
resetGame();
resizeCanvas();
gameLoop();
</script>
</body></html>
